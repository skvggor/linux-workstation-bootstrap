name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run ShellCheck
        run: shellcheck -S warning install.sh bootstrap.sh prepare-dropbox-sync.sh setup-gnome-terminal.sh scripts/*.sh
